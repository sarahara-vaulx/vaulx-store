<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Cancelled — VAULX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0ece4;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#111;border:1px solid #2a2a2a;border-radius:14px;padding:3rem 2.5rem;text-align:center;max-width:480px;width:100%}
.icon{font-size:48px;margin-bottom:1.5rem}
h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:#f0ece4;margin-bottom:0.75rem}
p{color:#888;font-size:14px;line-height:1.7;margin-bottom:2rem}
.btn{display:inline-block;background:#c9a84c;color:#0a0a0a;text-decoration:none;padding:12px 32px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:0.06em;transition:background 0.2s}
.btn:hover{background:#e8c97a}
</style>
</head>
<body>
<div class="card">
  <div class="icon">↩</div>
  <h1>Payment Cancelled</h1>
  <p>No charges were made. Your cart is still saved — you can try again whenever you're ready.</p>
  <a class="btn" href="/">Back to Store</a>
</div>
</body>
</html>
